abstract:
- language: eng
  script: Latn
  content: Since the OIML-CS was launched on 1 January 2018, replacing the OIML Basic
    Certificate System and the OIML Mutual Acceptance Arrangement, the OIML-CS has
    continued to develop. Most of these developments are taking place without the
    public noticing them, but they always aim to further develop the OIML-CS by increasing
    usage and trust by Utilizers and Associates in the OIML Certificates issued by
    OIML Issuing Authorities. In this overview we highlight some of the changes in
    2025.
