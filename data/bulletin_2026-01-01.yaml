- language: eng
  script: Latn
  content: We appreciate the invitation from OIML to address this highest gathering
    of professionals in legal metrology, in recognition of the initiative taken by
    the Delegation of Kazakhstan to UNESCO to have World Metrology Day, which is celebrated
    annually on 20th May, proclaimed as a UNESCO World Day in 2023 – thereby securing
    the recognition of metrology within the UN system.
