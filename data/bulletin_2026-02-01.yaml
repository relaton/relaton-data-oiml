abstract:
- language: eng
  script: Latn
  content: The scope of legal metrology extends into the areas of health, safety,
    and environmental measurements. We present the results of a survey of the OIMLs
    members on their priorities relating to environmental sustainability, and examine
    how the OIML’s technical work relates to the UN Sustainable Development Goals. We
    look at how the OIML's technical work, publications and processes might be used
    to address new areas of concern for legal metrology in the field of environmental
    sustainability.  We...
