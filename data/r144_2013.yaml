  doctype:
    content: recommendation
  flavor: oiml
  scope: This Recommendation applies to measuring instruments (hereafter referred
    to as "gas analytical systems") that serve to determine the volume fraction of
    carbon monoxide (CO), nitrogen monoxide (NO), nitrogen dioxide (NO<sub>2</sub>),
    or sum of nitrogen oxides (NO<sub>x</sub>) and establishes the conditions and
    requirements with which such systems shall comply in order to meet the requirements
    for measurement results of the pollutant content in stationary source emissions
    within OIML Member States.
