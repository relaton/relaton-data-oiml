- language: eng
  script: Latn
  content: The 60th Meeting of the International Committee of Legal Metrology (CIML)
    was held on 13 and 15 October 2025 in Paris, France, as an in-person meeting.
    Fifty-five Member States were present or represented, so the quorum was reached.
    In addition, there were representatives from twelve Corresponding Members and
    five Organizations in Liaison.
