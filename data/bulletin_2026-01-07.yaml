  content: The OIML Digitalization Task Group (DTG) was founded in May 2022 and confirmed
    by the 57th CIML (2022). It has 57 Members from 21 different countries and economies,
    and two organizations in liaison. Sascha Eichstädt (Germany) serves as Chairperson
    and Yang Ping (China) as Deputy Chairperson; both were reelected by the CIML in
    2025.
