  content: Throughout 2025 the Regional Legal Metrology Organizations Round Table
    Group (RLMO-RT) has continued its tradition of fostering international collaboration,
    knowledge sharing, and innovation in legal metrology. Following the transition
    of leadership at the 59th CIML Meeting, Mr Pedro Pérez (Colombia) assumed the
    role of Chair, with Pamela Dagg (Ireland) appointed as Vice Chair. Under this
    renewed leadership, and with consistent support from the BIML throughout the year,
