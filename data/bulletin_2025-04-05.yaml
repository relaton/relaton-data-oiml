abstract:
- language: eng
  script: Latn
  content: Following the successful inaugural edition in Hamburg in 2023, the 2nd
    International Conference of Weighing (ICW) will take place from 8 to 10 June 2026,
    in Kitakyushu, Japan. Hosted by the Japan Measuring Instruments Federation (JMIF)
    and organized by two Steering Committees from around the globe, ICW 2026 will
    bring together the global metrology community to explore the theme Innovative
    Weighing Solutions for a Sustainable World.
