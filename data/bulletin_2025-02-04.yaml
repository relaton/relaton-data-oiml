  content: As important as it is for a well-functioning modern society, legal metrology
    is often not seen or recognized by the larger public. In Austria, for instance,
    the initial and subsequent verifications of measuring instruments used to be visible
    exclusively by means of the verification stamp sealing the instrument against
    tampering. While this may be a reassuring sign for some consumers and end users,
    others are less convinced and request additional documentation or inspections
