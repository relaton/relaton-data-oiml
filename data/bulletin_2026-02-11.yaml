abstract:
- language: eng
  script: Latn
  content: The digital tachograph is an electronic device installed in commercial
    vehicles, such as trucks and buses, designed to automatically record driving times,
    speed, distance covered, and rest periods of the driver. Its primary purpose is
    to ensure road safety by preventing driver fatigue and to guarantee fair competition
    within the transport industry by enforcing compliance with social regulations
    [1].
