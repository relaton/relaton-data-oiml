abstract:
- language: eng
  script: Latn
  content: Tank measurements have been used for decades to trade liquids, but the
    Dutch legally introduced term “statische vloeistofhoeveelheidmeter” – or so-called
    static liquid quantity meter – is still relatively unknown. In this paper we provide
    information from NMi Certin B.V. about the static liquid quantity meter, intended
    for owners of tank farms and measuring instruments, manufacturers of measuring
    instruments, certification bodies and legislators, both in the Netherlands and
    other countries in...
