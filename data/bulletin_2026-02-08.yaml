abstract:
- language: eng
  script: Latn
  content: As the deployment of electric vehicle supply equipment (EVSE) accelerates
    globally, ensuring accurate and transparent measurement of electrical energy supplied
    for charging is an emerging regulatory requirement. In Australia, electric vehicles
    and subsequently EVSE entered widespread use before the availability of an OIML
    Recommendation specific to these instruments.
