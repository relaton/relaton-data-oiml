abstract:
- language: eng
  script: Latn
  content: The BIML has been very busy during the brief period since the 59th CIML
    Meeting in late October 2024. In this auspicious year marking both the 70th anniversary
    of the OIML and the 150th anniversary of the signing of the Metre Convention,
    we are focused on looking to the future of the Organization as well as reflecting
    on the past. We have participated in a multitude of anniversary events, engaged
    with social media, and contributed to anniversary publications.
