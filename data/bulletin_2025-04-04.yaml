abstract:
- language: eng
  script: Latn
  content: Industrial gases, such as oxygen (O2), nitrogen (N2) and argon (Ar), are
    generally exchanged in cylinders, of volume between 5 L and 50 L, while economic
    transactions are based on the mass of the gas contained within the cylinders under
    given filling conditions. The most immediate and, hence, accurate way to quantify
    the mass of gas contained in a cylinder is the gravimetric method, which requires
    weighing the cylinder before and after the filling process on a Non-Automatic
    Weighing Instrumen...
