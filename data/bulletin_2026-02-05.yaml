abstract:
- language: eng
  script: Latn
  content: The EU Emissions Trading System (EU ETS), launched in 2005, remains a central
    pillar of EU climate policy. Over the past two decades it has required major emitters
    in energy and industry to report and pay for their greenhouse gas (GHG) emissions,
    delivering a 51% reduction across covered sectors since 2005 [1]. The system has
    expanded to include aviation and maritime transport and now operates across all
    EU Member States plus Iceland, Liechtenstein, and Norway. 
