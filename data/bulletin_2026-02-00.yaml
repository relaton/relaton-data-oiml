  content: It has been an honour to serve as Guest Editor of this special edition
    of the OIML Bulletin (2026), focused on how legal metrology supports climate action
    and sustainability. Too often, legal metrology is overlooked because it is the
    invisible foundation stone of trust in measurement. Yet this foundation supports
    society, economies, and fairness. By assuring measurements that are accurate,
